[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false
exclude = [
    "^frontend/",
    "^\\.venv/",
    "^backend/data/",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]
